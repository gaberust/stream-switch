services:
  app:
    image: gaberust/stream-switch:latest
    ports:
      - "${BIND_HOST:-0.0.0.0}:3000:3000"
    volumes:
      - db-data:/data
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_PATH: /data/stream-switch.db
      BIND_HOST: '0.0.0.0'
    restart: unless-stopped

volumes:
  db-data:
